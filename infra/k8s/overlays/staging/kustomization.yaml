apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: meditrack-staging

resources:
  - ../../base/fastapi
  - ../../base/redis
  - ../../base/elasticsearch
  - ../../base/keycloak
  - fastapi/configmap.yaml
  - fastapi/reindex-cronjob.yaml
  - nginx/ingress.yaml

patchesStrategicMerge:
  - fastapi/deployment-patch.yaml
  - fastapi/reindex-cronjob-patch.yaml

configMapGenerator:
  - name: keycloak-realm-import
    files:
      - keycloak/meditrack-staging-realm.json
generatorOptions:
  disableNameSuffixHash: true

namePrefix: staging-
labels:
  - includeSelectors: true
    pairs:
      variant: staging

images:
  - name: ghcr.io/aryasutabaswara/meditrack-fastapi
    newTag: staging
