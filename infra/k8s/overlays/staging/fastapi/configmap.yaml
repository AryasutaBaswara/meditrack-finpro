apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-config
data:
  APP_ENV: "staging"
  APP_DEBUG: "false"
  APP_HOST: "0.0.0.0"
  APP_PORT: "8000"
  REDIS_URL: "redis://staging-redis:6379/0"
  REDIS_TTL_DEFAULT: "300"
  REDIS_TTL_DRUG_LIST: "3600"
  ELASTICSEARCH_URL: "http://staging-elasticsearch:9200"
  ELASTICSEARCH_INDEX_DRUGS: "meditrack_drugs"
  KEYCLOAK_URL: "http://staging-keycloak:8080"
  KEYCLOAK_REALM: "meditrack-staging"
  KEYCLOAK_CLIENT_ID: "meditrack-backend"
  KEYCLOAK_JWKS_URL: "http://staging-keycloak:8080/realms/meditrack-staging/protocol/openid-connect/certs"
  OPENAI_PROVIDER: "mock"
  STORAGE_BUCKET_PRESCRIPTIONS: "prescription-files"
  STORAGE_SIGNED_URL_EXPIRY: "3600"
  CORS_ORIGINS: "http://meditrack.staging.local"
