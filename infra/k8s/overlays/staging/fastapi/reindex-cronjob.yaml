apiVersion: batch/v1
kind: CronJob
metadata:
  name: fastapi-reindex
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: reindex
              image: ghcr.io/aryasutabaswara/meditrack-fastapi:dev
              imagePullPolicy: IfNotPresent
              command:
                - python
                - -m
                - app.services.search_indexer
              envFrom:
                - configMapRef:
                    name: fastapi-config
                - secretRef:
                    name: fastapi-secrets
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
