name: CD (GitOps)

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  update-manifest:
    name: Update K8s Manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update Staging Manifest Image Tag
        run: |
          cd infra/k8s/overlays/staging
          kustomize edit set image ghcr.io/aryasutabaswara/meditrack-fastapi=ghcr.io/aryasutabaswara/meditrack-fastapi:staging-${{ github.sha }}

      - name: Commit and Push Manifest Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/overlays/staging/kustomization.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore(gitops): update staging image tag to staging-${{ github.sha }}"
          git push origin ${{ github.ref_name }}

  verify-staging:
    name: Verify Staging
    runs-on: self-hosted
    needs: update-manifest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Wait for ArgoCD sync target revision
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $targetSha = '${{ github.sha }}'
          $expectedTag = "ghcr.io/aryasutabaswara/meditrack-fastapi:staging-$targetSha"
          for ($attempt = 1; $attempt -le 30; $attempt++) {
            $currentImage = kubectl get deployment staging-fastapi -n meditrack-staging -o jsonpath='{.spec.template.spec.containers[0].image}'
            if ($currentImage -eq $expectedTag) {
              Write-Host "Staging deployment now uses $currentImage"
              exit 0
            }
            Write-Host "Attempt $attempt`: current image is $currentImage, waiting for $expectedTag"
            Start-Sleep -Seconds 10
          }
          Write-Error "Timed out waiting for ArgoCD to deploy $expectedTag"

      - name: Verify staging rollouts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          kubectl rollout status deployment/staging-fastapi -n meditrack-staging --timeout=300s
          kubectl rollout status deployment/staging-keycloak -n meditrack-staging --timeout=300s
          kubectl rollout status deployment/staging-elasticsearch -n meditrack-staging --timeout=300s
          kubectl rollout status deployment/staging-redis -n meditrack-staging --timeout=300s

      - name: Verify staging health endpoint
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $logPath = Join-Path $env:RUNNER_TEMP 'meditrack-fastapi-port-forward.log'
          $pfProcess = Start-Process -FilePath 'kubectl' -ArgumentList 'port-forward','-n','meditrack-staging','svc/staging-fastapi','18000:80' -RedirectStandardOutput $logPath -RedirectStandardError $logPath -PassThru -WindowStyle Hidden
          try {
            for ($attempt = 1; $attempt -le 20; $attempt++) {
              try {
                $response = Invoke-WebRequest -Uri 'http://127.0.0.1:18000/api/v1/health' -UseBasicParsing -TimeoutSec 5
                if ($response.Content -match '"status":"ok"') {
                  exit 0
                }
              } catch {
              }
              Start-Sleep -Seconds 3
            }
            Write-Host 'Staging health endpoint did not become ready'
            if (Test-Path $logPath) { Get-Content $logPath }
            exit 1
          }
          finally {
            if ($pfProcess -and -not $pfProcess.HasExited) {
              Stop-Process -Id $pfProcess.Id -Force
            }
          }

      - name: Verify reindex cronjob exists
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          kubectl get cronjob staging-fastapi-reindex -n meditrack-staging
