name: CD (GitOps)

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  update-manifest:
    name: Update K8s Manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update Staging Manifest Image Tag
        run: |
          cd infra/k8s/overlays/staging
          kustomize edit set image ghcr.io/aryasutabaswara/meditrack-fastapi=ghcr.io/aryasutabaswara/meditrack-fastapi:staging-${{ github.sha }}

      - name: Commit and Push Manifest Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/overlays/staging/kustomization.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore(gitops): update staging image tag to staging-${{ github.sha }}"
          git push origin ${{ github.ref_name }}

  verify-staging:
    name: Verify Staging
    runs-on: self-hosted
    needs: update-manifest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Wait for ArgoCD sync target revision
        shell: bash
        run: |
          set -euo pipefail
          target_sha="${{ github.sha }}"
          expected_tag="ghcr.io/aryasutabaswara/meditrack-fastapi:staging-${target_sha}"
          for attempt in $(seq 1 30); do
            current_image=$(kubectl get deployment staging-fastapi -n meditrack-staging -o jsonpath='{.spec.template.spec.containers[0].image}')
            if [[ "$current_image" == "$expected_tag" ]]; then
              echo "Staging deployment now uses $current_image"
              exit 0
            fi
            echo "Attempt $attempt: current image is $current_image, waiting for $expected_tag"
            sleep 10
          done
          echo "Timed out waiting for ArgoCD to deploy $expected_tag"
          exit 1

      - name: Verify staging rollouts
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout status deployment/staging-fastapi -n meditrack-staging --timeout=300s
          kubectl rollout status deployment/staging-keycloak -n meditrack-staging --timeout=300s
          kubectl rollout status deployment/staging-elasticsearch -n meditrack-staging --timeout=300s
          kubectl rollout status deployment/staging-redis -n meditrack-staging --timeout=300s

      - name: Verify staging health endpoint
        shell: bash
        run: |
          set -euo pipefail
          kubectl port-forward -n meditrack-staging svc/staging-fastapi 18000:80 >/tmp/meditrack-fastapi-port-forward.log 2>&1 &
          pf_pid=$!
          trap 'kill $pf_pid' EXIT
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18000/api/v1/health | grep -q '"status":"ok"'; then
              exit 0
            fi
            sleep 3
          done
          echo "Staging health endpoint did not become ready"
          cat /tmp/meditrack-fastapi-port-forward.log || true
          exit 1

      - name: Verify reindex cronjob exists
        shell: bash
        run: |
          set -euo pipefail
          kubectl get cronjob staging-fastapi-reindex -n meditrack-staging
